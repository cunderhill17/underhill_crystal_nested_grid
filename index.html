<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Nested Grid Layout</title>
</head>
<body>
    
        <h1 class="visually-hidden">Nested Grid Layout Example</h1>

        <header class="grid-con">
            <div id="hamburger-menu" class="box col-span-1 md:col-start-8 md:col-end-9">
                <p>Hamburger menu</p>
            </div>
            <div id="cart" class="box col-start-4 col-end-5 md:col-start-7 md:col-end-8 lg:col-start-12 lg:col-end-13">
                <p>Cart</p>
            </div>
            <div id="logo" class="box col-span-full md:col-span-4 lg:col-span-4">
                <p>Logo</p>
            </div>

            <nav id="main-nav" class="box lg:col-start-5 lg:col-end-12">
                <h2 class="visually-hidden">Main Navigation</h2>
                <ul>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </nav>
        </header>

        <!-- Hero Section -->
        <div class="full-width-grid-con pos-relative">
            <img class="col-span-full" id="hero-image"
                sizes="100vw"
                srcset="
                images/hero-image-412.jpg 412w,
                images/hero-image-1324.jpg 1324w,
                images/hero-image-1938.jpg 1938w,
                images/hero-image-2478.jpg 2478w"
                src="images/hero-image-2478.jpg"
                alt="Shot of Dark Cherry Liqueur on a bar top"
            >
            <section id="nested-hero-grid" class="grid-con">
                <div class="col-span-full">
                    <h2>Begin Beautifully</h2>
                    <h3>Quattro is a modern aperitif crafted to awaken the senses before the first course.</h3>
                    <div class="call-to-action">
                        <a href="#">Discover the ritual</a>
                    </div>
                </div>
            </section>
        </div>


    
    <script src="js/main.js"></script>
</body>
</html>
